poster:
  size: A1
  orientation: portrait

theme:
  accent: "#2E7D32"
  base_size: 18

title:
  title: "How to Make an Academic Poster"
  authors: "*A guide to the ggposter card types"
  funding: "Each left-column card demonstrates one card type; the matching center-column card shows the YAML spec for it; the matching right-column card shows the equivalent R code."

layout:
  align_rows: true
  left:   [howto_bullets, howto_figure, howto_figure_notes, howto_table_notes, howto_photo, howto_title, howto_layout]
  center: [yml_bullets, yml_figure, yml_figure_notes, yml_table_notes, yml_photo, yml_title, yml_layout]
  right:  [code_bullets, code_figure, code_figure_notes, code_table_notes, code_photo, code_title, code_layout]

sections:
  howto_bullets:
    header: "Bullet list only"
    height: "auto"
    body:
      type: text
      md:
        - "- Bullet points summarize key facts."
        - "- Each line starts with a dash."
        - "- Long lines wrap to fit the card."

  howto_figure:
    header: "Figure only"
    height: "auto"
    body:
      type: figure
      object: howto_fig
      height: 55

  howto_figure_notes:
    header: "Figure + bullets (below)"
    height: "auto"
    body:
      type: figure
      object: howto_fig_notes
      height: 90
      caption: |-
        - A figure's caption= adds bullets below it.
        - Great for calling out key takeaways.

  howto_table_notes:
    header: "Table + bullets (right)"
    height: "auto"
    body:
      type: table
      object: howto_tbl_notes
      notes_width: 0.4
      notes:
        - "- A table's notes= sits beside it."
        - "- Good for a short note."

  howto_photo:
    header: "Photo strip"
    height: "auto"
    body:
      type: image
      files: [small.JPG, tall.jpg, wide.jpg]
      labels: ["Photo 1", "Photo 2", "Photo 3"]
      width: 200

  howto_title:
    header: "The title band"
    height: "auto"
    body:
      type: text
      md:
        - "- `title` is written once, not per column."
        - "- `title`, `authors`, `funding` stack top to bottom."
        - "- It spans the full poster width, above every column."

  howto_layout:
    header: "The layout"
    height: "auto"
    body:
      type: text
      md:
        - "- `layout` assigns section names to columns."
        - "- Column names are free-form -- not just left/right."
        - "- `align_rows: true` lines up each row to the tallest card at that row."

  yml_bullets:
    header: "YAML: bullet list"
    height: "auto"
    body:
      type: text
      md:
        - "howto_bullets:"
        - "  header: \"Bullet list only\""
        - "  height: \"auto\""
        - "  body:"
        - "    type: text"
        - "    md:"
        - "      \\- \"- Bullet points summarize key facts.\""
        - "      \\- \"- Each line starts with a dash.\""
        - "      \\- \"- Long lines wrap to fit the card.\""

  yml_figure:
    header: "YAML: figure only"
    height: "auto"
    body:
      type: text
      md:
        - "howto_figure:"
        - "  header: \"Figure only\""
        - "  height: \"auto\""
        - "  body:"
        - "    type: figure"
        - "    object: howto_fig"
        - "    height: 95"

  yml_figure_notes:
    header: "YAML: figure + bullets"
    height: "auto"
    body:
      type: text
      md:
        - "howto_figure_notes:"
        - "  header: \"Figure + bullets (below)\""
        - "  height: \"auto\""
        - "  body:"
        - "    type: figure"
        - "    object: howto_fig_notes"
        - "    height: 90"
        - "    caption: |-"
        - "      \\- A figure's caption= adds bullets below it."
        - "      \\- Great for calling out key takeaways."

  yml_table_notes:
    header: "YAML: table + bullets"
    height: "auto"
    body:
      type: text
      md:
        - "howto_table_notes:"
        - "  header: \"Table + bullets (right)\""
        - "  height: \"auto\""
        - "  body:"
        - "    type: table"
        - "    object: howto_tbl_notes"
        - "    notes_width: 0.4"
        - "    notes:"
        - "      \\- \"- A table's notes= sits beside it.\""
        - "      \\- \"- Good for a short note.\""

  yml_photo:
    header: "YAML: photo strip"
    height: "auto"
    body:
      type: text
      md:
        - "howto_photo:"
        - "  header: \"Photo strip\""
        - "  height: \"auto\""
        - "  body:"
        - "    type: image"
        - "    files:"
        - "      \\- small.JPG"
        - "      \\- tall.jpg"
        - "      \\- wide.jpg"
        - "    labels:"
        - "      \\- \"Photo 1\""
        - "      \\- \"Photo 2\""
        - "      \\- \"Photo 3\""
        - "    width: 200"

  yml_title:
    header: "YAML: title"
    height: "auto"
    body:
      type: text
      md:
        - "title:"
        - "  title: \"How to Make an Academic Poster\""
        - "  authors: \"*A guide to the ggposter card types\""
        - "  funding: \"...\""

  yml_layout:
    header: "YAML: layout"
    height: "auto"
    body:
      type: text
      md:
        - "layout:"
        - "  align_rows: true"
        - "  left: howto_bullets, ..."
        - "  center: yml_bullets, ..."
        - "  right: code_bullets, ..."

  code_bullets:
    header: "Code: bullet list"
    height: "auto"
    body:
      type: text
      md:
        - "list("
        - "  header = \"Bullet list only\","
        - "  body = list("
        - "    type = \"text\","
        - "    md = c("
        - "      \"- Bullet points summarize key facts.\","
        - "      \"- Each line starts with a dash.\","
        - "      \"- Long lines wrap to fit the card.\""
        - "    )"
        - "  )"
        - ")"

  code_figure:
    header: "Code: figure only"
    height: "auto"
    body:
      type: text
      md:
        - "list("
        - "  header = \"Figure only\","
        - "  body = list("
        - "    type = \"figure\","
        - "    object = \"howto_fig\","
        - "    height = 95"
        - "  )"
        - ")"

  code_figure_notes:
    header: "Code: figure + bullets"
    height: "auto"
    body:
      type: text
      md:
        - "list("
        - "  header = \"Figure + bullets (below)\","
        - "  body = list("
        - "    type = \"figure\","
        - "    object = \"howto_fig_notes\","
        - "    height = 90,"
        - "    caption = paste("
        - "      \"- A figure's caption= adds bullets below it.\","
        - "      \"- Great for calling out key takeaways.\","
        - "      sep = \"\\n\""
        - "    )"
        - "  )"
        - ")"

  code_table_notes:
    header: "Code: table + bullets"
    height: "auto"
    body:
      type: text
      md:
        - "list("
        - "  header = \"Table + bullets (right)\","
        - "  body = list("
        - "    type = \"table\","
        - "    object = \"howto_tbl_notes\","
        - "    notes_width = 0.4,"
        - "    notes = c("
        - "      \"- A table's notes= sits beside it.\","
        - "      \"- Good for a short note.\""
        - "    )"
        - "  )"
        - ")"

  code_photo:
    header: "Code: photo strip"
    height: "auto"
    body:
      type: text
      md:
        - "list("
        - "  header = \"Photo strip\","
        - "  body = list("
        - "    type = \"image\","
        - "    files = c(\"small.JPG\", \"tall.jpg\", \"wide.jpg\"),"
        - "    labels = c(\"Photo 1\", \"Photo 2\", \"Photo 3\"),"
        - "    width = 200"
        - "  )"
        - ")"

  code_title:
    header: "Code: title"
    height: "auto"
    body:
      type: text
      md:
        - "title = list("
        - "  title = \"How to Make an Academic Poster\","
        - "  authors = \"*A guide to the ggposter card types\","
        - "  funding = \"...\""
        - ")"

  code_layout:
    header: "Code: layout"
    height: "auto"
    body:
      type: text
      md:
        - "layout = list("
        - "  align_rows = TRUE,"
        - "  left   = c(\"howto_bullets\", ...),"
        - "  center = c(\"yml_bullets\", ...),"
        - "  right  = c(\"code_bullets\", ...)"
        - ")"
